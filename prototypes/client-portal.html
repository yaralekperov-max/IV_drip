<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENA — личный кабинет (полный прототип)</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1410;--bg-2:#0F1B16;--panel:#13241D;--panel-2:#172E25;
    --ink:#F2EFE8;--ink-soft:#A8B5AD;--ink-dim:#6E7C73;
    --gold:#C9A86A;--gold-bright:#E3C78D;
    --line:rgba(201,168,106,0.18);--line-soft:rgba(242,239,232,0.08);
    --pos:#7FB88A;--neg:#C97A6A;--warn:#D9B470;--info:#7AA8C9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.serif{font-family:'Fraunces',serif;font-weight:400;}
  a{color:inherit;text-decoration:none;}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% -5%,rgba(201,168,106,0.07),transparent 70%);}

  .shell{display:flex;min-height:100vh;position:relative;z-index:1;}
  .nav{width:240px;flex-shrink:0;background:var(--bg-2);border-right:1px solid var(--line-soft);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;}
  .nav-logo{padding:24px;font-family:'Fraunces',serif;font-size:21px;letter-spacing:0.22em;border-bottom:1px solid var(--line-soft);}
  .nav-logo b{color:var(--gold);}
  .nav-logo span{display:block;font-family:'Inter';font-size:10px;letter-spacing:0.12em;color:var(--ink-dim);margin-top:4px;text-transform:uppercase;}
  .nav-items{flex-grow:1;padding:14px 12px;overflow-y:auto;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:all .2s;margin-bottom:2px;}
  .nav-item:hover{background:var(--panel);color:var(--ink);}
  .nav-item.active{background:rgba(201,168,106,0.1);color:var(--gold-bright);}
  .nav-item .ic{font-size:15px;width:18px;text-align:center;}
  .nav-item .badge{margin-left:auto;background:var(--gold);color:var(--bg);font-size:10px;font-weight:600;padding:1px 7px;border-radius:999px;}
  .nav-user{padding:16px 20px;border-top:1px solid var(--line-soft);display:flex;align-items:center;gap:12px;cursor:pointer;}
  .nav-user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0;}
  .nav-user-info b{display:block;font-size:13px;font-weight:500;}
  .nav-user-info span{font-size:11px;color:var(--ink-dim);}

  .content{margin-left:240px;flex-grow:1;width:calc(100% - 240px);padding:32px 40px 60px;max-width:1020px;}

  .statebar{display:flex;gap:8px;align-items:center;margin-bottom:24px;padding:10px 14px;background:var(--panel);border:1px dashed var(--line);border-radius:12px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;}
  .statebar b{color:var(--gold);}
  .statebar button{font-size:12px;padding:6px 12px;border:1px solid var(--line-soft);background:transparent;color:var(--ink-soft);border-radius:999px;cursor:pointer;transition:all .2s;font-family:'Inter';}
  .statebar button:hover,.statebar button.on{border-color:var(--gold);color:var(--ink);}

  .screen{display:none;}
  .screen.active{display:block;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;}}

  .scr-hd{margin-bottom:26px;}
  .scr-hd h1{font-size:30px;font-weight:300;margin-bottom:6px;}
  .scr-hd h1 em{font-style:italic;color:var(--gold-bright);}
  .scr-hd p{color:var(--ink-soft);font-weight:300;font-size:15px;}

  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:18px;padding:26px;margin-bottom:20px;}
  .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .card-hd h2{font-size:18px;font-weight:400;}
  .card-hd h3{font-size:16px;font-weight:500;}
  .eyebrow{font-size:11px;letter-spacing:0.13em;text-transform:uppercase;color:var(--gold);}
  .link{font-size:13px;color:var(--gold);cursor:pointer;}
  .link:hover{opacity:0.7;}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;}
  @media(max-width:900px){.grid2{grid-template-columns:1fr;}}

  .btn-gold{background:var(--gold);color:var(--bg);padding:13px 26px;border:none;border-radius:999px;font-family:'Inter';font-size:14px;font-weight:500;cursor:pointer;transition:all .3s;}
  .btn-gold:hover{background:var(--gold-bright);transform:translateY(-1px);}
  .btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .btn-ghost{background:transparent;color:var(--ink);padding:13px 22px;border:1px solid var(--line);border-radius:999px;font-family:'Inter';font-size:14px;cursor:pointer;transition:border-color .3s;}
  .btn-ghost:hover{border-color:var(--gold);}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;}
  .btn-sm{font-size:12.5px;padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;font-family:'Inter';transition:border-color .2s;}
  .btn-sm:hover{border-color:var(--gold);}

  .badge-s{font-size:11px;padding:4px 11px;border-radius:999px;white-space:nowrap;display:inline-block;}
  .b-pending{background:rgba(217,180,112,0.14);color:var(--warn);}
  .b-confirmed{background:rgba(201,168,106,0.14);color:var(--gold);}
  .b-assigned{background:rgba(122,168,201,0.14);color:var(--info);}
  .b-done{background:rgba(127,184,138,0.12);color:var(--pos);}
  .b-cancel{background:rgba(201,122,106,0.14);color:var(--neg);}
  .b-review{background:rgba(217,180,112,0.14);color:var(--warn);}

  .empty{text-align:center;padding:50px 24px;}
  .empty-ic{font-size:40px;margin-bottom:16px;opacity:.7;}
  .empty h3{font-size:20px;font-weight:400;margin-bottom:8px;}
  .empty p{color:var(--ink-soft);font-weight:300;font-size:14px;max-width:400px;margin:0 auto 22px;}

  .row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line-soft);}
  .row:last-child{border-bottom:none;}
  .row-grow{flex-grow:1;}
  .row h4{font-size:14px;font-weight:500;margin-bottom:2px;}
  .row p{font-size:12.5px;color:var(--ink-dim);}
  .row-val{font-family:'Fraunces',serif;font-size:16px;}
  .row-date{width:52px;flex-shrink:0;text-align:center;}
  .row-date b{font-family:'Fraunces',serif;font-size:20px;display:block;line-height:1;}
  .row-date span{font-size:11px;color:var(--ink-dim);text-transform:uppercase;}

  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:7px;}
  .field input,.field select{width:100%;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:10px;padding:13px 16px;color:var(--ink);font-family:'Inter';font-size:14px;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold);}

  .chip-row{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{padding:10px 18px;border:1px solid var(--line-soft);border-radius:999px;font-size:13.5px;cursor:pointer;transition:all .25s;color:var(--ink-soft);}
  .chip:hover{border-color:var(--gold);}
  .chip.sel{background:rgba(201,168,106,0.12);border-color:var(--gold);color:var(--ink);}

  .consent{display:flex;gap:12px;align-items:flex-start;padding:16px;background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;margin-bottom:14px;cursor:pointer;transition:border-color .2s;}
  .consent:hover{border-color:var(--line);}
  .consent.checked{border-color:var(--gold);}
  .consent-box{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--bg);transition:all .2s;}
  .consent.checked .consent-box{background:var(--gold);border-color:var(--gold);}
  .consent-text{font-size:13px;color:var(--ink-soft);font-weight:300;line-height:1.6;}
  .consent-text b{color:var(--ink);font-weight:500;}
  .consent-text a{color:var(--gold);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);z-index:300;background:var(--panel-2);border:1px solid var(--gold);border-radius:12px;padding:14px 22px;display:flex;align-items:center;gap:12px;transition:transform .5s cubic-bezier(.22,1,.36,1);box-shadow:0 18px 50px -12px rgba(0,0,0,.6);max-width:90vw;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast-ic{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .toast-t{font-size:13.5px;font-weight:500;}

  .modal-bg{position:fixed;inset:0;background:rgba(5,9,7,.78);backdrop-filter:blur(7px);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:22px;max-width:560px;width:100%;padding:32px;position:relative;}
  .modal-close{position:absolute;top:20px;right:22px;width:36px;height:36px;border-radius:50%;border:1px solid var(--line-soft);background:transparent;color:var(--ink);font-size:18px;cursor:pointer;}
  .modal h3{font-size:23px;font-weight:400;margin-bottom:6px;}
  .modal-sub{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
  .step-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin:20px 0 12px;}
  .summary{background:var(--bg-2);border:1px solid var(--line-soft);border-radius:12px;padding:16px;margin-top:18px;font-size:13.5px;color:var(--ink-soft);}
  .summary b{color:var(--ink);}

  .spinner{width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:760px){
    .nav{transform:translateX(-100%);transition:transform .3s;z-index:50;box-shadow:0 0 40px rgba(0,0,0,.5);}
    .nav.open{transform:translateX(0);}
    .content{margin-left:0;width:100%;padding:18px;}
    .mobile-bar{display:flex !important;}
  }
  .mobile-bar{display:none;align-items:center;gap:14px;margin-bottom:18px;}
  .burger{font-size:24px;cursor:pointer;}
</style>
</head>
<body>
<div class="shell">
  <aside class="nav" id="nav">
    <div class="nav-logo">V<b>E</b>NA<span>Личный кабинет</span></div>
    <div class="nav-items">
      <div class="nav-item active" data-screen="home"><span class="ic">⌂</span> Главная</div>
      <div class="nav-item" data-screen="booking"><span class="ic">✚</span> Записаться</div>
      <div class="nav-item" data-screen="visits"><span class="ic">◷</span> Мои визиты</div>
      <div class="nav-item" data-screen="analyses"><span class="ic">🩺</span> Анализы</div>
      <div class="nav-item" data-screen="payments"><span class="ic">₽</span> Платежи</div>
      <div class="nav-item" data-screen="documents"><span class="ic">▤</span> Документы</div>
      <div class="nav-item" data-screen="bonuses"><span class="ic">★</span> Бонусы</div>
      <div class="nav-item" data-screen="support"><span class="ic">☎</span> Поддержка</div>
      <div class="nav-item" data-screen="profile"><span class="ic">⚙</span> Профиль</div>
    </div>
    <div class="nav-user" onclick="go('profile')">
      <div class="nav-user-av">АМ</div>
      <div class="nav-user-info"><b>Александр</b><span>Gold-клиент</span></div>
    </div>
  </aside>

  <main class="content">
    <div class="mobile-bar"><span class="burger" onclick="document.getElementById('nav').classList.toggle('open')">☰</span><div class="nav-logo" style="border:none;padding:0;font-size:18px;">V<b>E</b>NA</div></div>
    <div class="statebar">
      <b>Демо-состояния:</b>
      <button class="on" id="st-filled" onclick="setState('filled')">Активный клиент</button>
      <button id="st-new" onclick="setState('new')">Новый клиент (пустой ЛК)</button>
      <button onclick="go('auth')">Вход / регистрация</button>
      <span style="margin-left:auto;color:var(--ink-dim);">переключатель только для демо</span>
    </div>
    <div id="screens"></div>
  </main>
</div>

<div class="toast" id="toast"><div class="toast-ic">✓</div><div class="toast-t" id="toastT"></div></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalInner"></div></div>

<script>
// ============ VENA LK — full prototype screens ============
let STATE = 'filled'; // 'filled' | 'new'
let CURRENT = 'home';

// ---------- screen builders ----------
const S = {};

// ===== HOME =====
S.home = ()=> STATE==='new' ? `
  <div class="scr-hd"><h1>Добро пожаловать, <em>Александр</em></h1><p>Ваш кабинет готов. Начните с первой записи — бригада приедет к вам.</p></div>
  <div class="card"><div class="empty">
    <div class="empty-ic">✦</div>
    <h3>Здесь появятся ваши визиты</h3>
    <p>Запишитесь на первую капельницу — выберите программу, удобное время и адрес. Дальше тут будут статус визита, динамика анализов и история.</p>
    <button class="btn-gold" onclick="go('booking')">Записаться на визит</button>
  </div></div>
  <div class="card"><div class="card-hd"><h3>Что вы получите</h3></div>
    <div class="row"><div class="row-grow"><h4>Выезд врача и медсестры к вам</h4><p>Домой, в офис, между встречами</p></div></div>
    <div class="row"><div class="row-grow"><h4>Динамику анализов было→стало</h4><p>Загружаете результаты — видите прогресс</p></div></div>
    <div class="row"><div class="row-grow"><h4>Личное ведение врачом</h4><p>Протокол под вашу цель и состояние</p></div></div>
  </div>
` : `
  <div class="scr-hd"><h1>С возвращением, <em>Александр</em></h1><p>Ваша бригада уже в пути — следующий визит сегодня.</p></div>
  <div class="grid2">
    <div>
      <div class="card" style="border-color:var(--gold);background:linear-gradient(135deg,var(--panel-2),var(--bg-2));">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><span style="width:11px;height:11px;border-radius:50%;background:var(--pos);display:inline-block;"></span><span style="font-size:12px;color:var(--pos);text-transform:uppercase;letter-spacing:.05em;font-weight:600;">Бригада в пути</span></div>
        <div style="font-family:'Fraunces';font-size:32px;color:var(--gold-bright);margin-bottom:4px;">≈ 14 минут</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:18px;">Прибытие к 14:30 · Пресненский</div>
        <div class="row" style="border:none;padding-top:14px;border-top:1px solid var(--line-soft);">
          <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2a4a3c,#1a2e24);display:flex;align-items:center;justify-content:center;border:1px solid var(--line);">👩‍⚕️</div>
          <div class="row-grow"><h4>Медсестра Ольга</h4><p>ваш постоянный специалист · 4.9★</p></div>
        </div>
      </div>
      <div class="card" style="background:linear-gradient(150deg,var(--panel-2),var(--bg-2));border-color:var(--line);">
        <div class="eyebrow" style="margin-bottom:12px;">Повторить последнее</div>
        <div style="font-family:'Fraunces';font-size:26px;margin-bottom:6px;">Капельница «Энергия+»</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:20px;">Последний визит — 14 июня · дома</div>
        <div class="btn-row"><button class="btn-gold" onclick="go('booking')">Записаться в один тап</button><button class="btn-ghost" onclick="go('booking')">Другую</button></div>
      </div>
      <div class="card">
        <div class="card-hd"><h3>Ваш курс</h3><span class="eyebrow">Энергия · 4 визита</span></div>
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:16px;"><b style="font-family:'Fraunces';font-size:30px;color:var(--gold-bright);">3</b><span style="font-size:14px;color:var(--ink-soft);">из 4 пройдено</span></div>
        <div style="display:flex;gap:8px;"><div style="flex:1;height:6px;border-radius:3px;background:var(--gold);"></div><div style="flex:1;height:6px;border-radius:3px;background:var(--gold);"></div><div style="flex:1;height:6px;border-radius:3px;background:var(--gold);"></div><div style="flex:1;height:6px;border-radius:3px;background:var(--line-soft);"></div></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="eyebrow" style="margin-bottom:14px;">Вас ведёт</div>
        <div class="row" style="border:none;padding:0;"><div style="width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#2a4a3c,#1a2e24);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--line);">🩺</div><div class="row-grow"><h4>Соколова Е. А.</h4><p>терапевт · к.м.н. · 4.9★</p></div></div>
      </div>
      <div class="card">
        <div class="card-hd"><h3>Подготовка к визиту</h3></div>
        <div class="row" style="padding:9px 0;"><span style="color:var(--gold);">✓</span><div class="row-grow"><p style="color:var(--ink-soft);font-size:13.5px;">Выпейте 1–2 стакана воды за час</p></div></div>
        <div class="row" style="padding:9px 0;"><span style="color:var(--gold);">✓</span><div class="row-grow"><p style="color:var(--ink-soft);font-size:13.5px;">Не ешьте тяжёлое за 1.5 часа</p></div></div>
        <div class="row" style="padding:9px 0;"><span style="color:var(--gold);">✓</span><div class="row-grow"><p style="color:var(--ink-soft);font-size:13.5px;">Освободите руку, удобная одежда</p></div></div>
      </div>
      <div class="card">
        <div class="card-hd"><h3>Динамика</h3><span class="link" onclick="go('analyses')">Анализы →</span></div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:6px;">Витамин D</div>
        <div style="font-family:'Fraunces';font-size:15px;margin-bottom:12px;">19 → <b style="color:var(--gold-bright);">37</b> нг/мл</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:6px;">Ферритин</div>
        <div style="font-family:'Fraunces';font-size:15px;">22 → <b style="color:var(--gold-bright);">48</b> нг/мл</div>
      </div>
    </div>
  </div>
`;

// ===== BOOKING =====
S.booking = ()=> `
  <div class="scr-hd"><h1>Записаться <em>на визит</em></h1><p>Выберите программу, желаемое время и адрес. Оператор подтвердит слот после проверки доступности бригады.</p></div>
  <div class="card">
    <div class="step-label">Программа</div>
    <div class="chip-row" id="bk-prog">
      <div class="chip" data-v="Энергия+">⚡ Энергия+</div><div class="chip" data-v="Детокс">🌿 Детокс</div><div class="chip" data-v="Иммунитет">🛡️ Иммунитет</div><div class="chip" data-v="Красота">✨ Красота</div><div class="chip" data-v="Ясность">🧠 Ясность</div><div class="chip" data-v="По анализам">🩺 По анализам</div>
    </div>
    <div class="step-label">Дата</div>
    <div class="chip-row" id="bk-date"><div class="chip" data-v="Сегодня">Сегодня</div><div class="chip" data-v="Завтра">Завтра</div><div class="chip" data-v="23 июня">23 июня</div><div class="chip" data-v="24 июня">24 июня</div></div>
    <div class="step-label">Желаемое время</div>

  return `<div class="row"><div class="row-grow"><h4 style="font-weight:400;">${label}</h4></div><div class="tgl ${on?'on':''}" onclick="this.classList.toggle('on')" style="width:42px;height:24px;border-radius:999px;background:${on?'var(--gold)':'var(--line-soft)'};position:relative;cursor:pointer;transition:background .3s;"><span style="position:absolute;top:3px;left:${on?'21px':'3px'};width:18px;height:18px;border-radius:50%;background:var(--bg);transition:left .3s;"></span></div></div>`;
}

// ---------- booking flow ----------
const bk = {prog:null,date:null,time:null,addr:null,pay:null};
function wireBooking(){
  [['bk-prog','prog'],['bk-date','date'],['bk-time','time'],['bk-addr','addr'],['bk-pay','pay']].forEach(([id,key])=>{
    const host=document.getElementById(id); if(!host) return;
    host.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
      host.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel'); bk[key]=c.dataset.v; updateBk();
    }));
  });
}
function updateBk(){
  const btn=document.getElementById('bk-btn'), sum=document.getElementById('bk-sum');
  if(!btn) return;
  if(bk.prog&&bk.date&&bk.time&&bk.addr&&bk.pay){
    sum.style.display='block';
    sum.innerHTML=`<b>${bk.prog}</b> · ${bk.date}, ${bk.time}<br>${bk.addr}<br>Оплата: ${bk.pay} · <b>18 000 ₽</b>`;
    btn.disabled=false; btn.textContent='Продолжить к согласию';
  } else { btn.disabled=true; btn.textContent='Выберите все пункты'; }
}

    <div class="consent checked" onclick="this.classList.toggle('checked')"><div class="consent-box">✓</div><div class="consent-text">Я ознакомлен с <b>показаниями и противопоказаниями</b> и даю <a>информированное согласие</a> на проведение IV-терапии</div></div>
    <div class="consent checked" onclick="this.classList.toggle('checked')"><div class="consent-box">✓</div><div class="consent-text">Подтверждаю, что предоставленные сведения о здоровье <b>достоверны</b></div></div>
    <div class="summary"><b>${bk.prog}</b> · ${bk.date}, ${bk.time} · ${bk.addr}<br>Желаемый слот — оператор подтвердит доступность бригады</div>
    <button class="btn-gold" style="width:100%;margin-top:20px;" onclick="confirmBooking()">Отправить заявку</button>
  `;
  document.getElementById('modalBg').classList.add('show');
}
function confirmBooking(){
  document.getElementById('modalInner').innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="width:64px;height:64px;border-radius:50%;background:rgba(217,180,112,0.15);color:var(--warn);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px;">🕓</div>
      <h3>Заявка отправлена</h3>
      <p style="color:var(--ink-soft);font-size:14px;font-weight:300;margin-top:10px;max-width:380px;margin-left:auto;margin-right:auto;">Оператор проверит доступность бригады в выбранном районе и времени, затем подтвердит слот. Статус — в разделе «Мои визиты».</p>
      <div style="margin-top:14px;"><span class="badge-s b-pending">на подтверждении</span></div>
      <button class="btn-gold" style="margin-top:24px;" onclick="closeModal();go('visits')">К моим визитам</button>
    </div>`;
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });

function cancelVisit(el){
  document.getElementById('modalInner').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>Отменить визит?</h3>
    <div class="modal-sub">Визит 23 июня, 12:00 · Офис. Отмена бесплатна не позднее чем за 4 часа.</div>
    <div class="btn-row"><button class="btn-gold" onclick="closeModal();toast('Визит отменён, средства вернутся на карту')">Да, отменить</button><button class="btn-ghost" onclick="closeModal()">Оставить</button></div>`;
  document.getElementById('modalBg').classList.add('show');
}

// ---------- analyses upload (hybrid) ----------
function startUpload(){
  if(STATE==='new'){ setState('filled'); go('analyses'); setTimeout(startUpload,300); return; }
  const host=document.getElementById('uploadHost'); if(!host) return;
  host.innerHTML = `
    <div class="consent checked" id="med-consent" onclick="this.classList.toggle('checked')" style="margin-bottom:14px;"><div class="consent-box">✓</div><div class="consent-text">Согласен на обработку <b>медицинских данных</b> и их распознавание для отображения динамики (152-ФЗ)</div></div>
    <label style="border:1.5px dashed var(--line);border-radius:14px;padding:22px;text-align:center;cursor:pointer;display:block;margin-bottom:18px;background:rgba(201,168,106,.03);">
      <input type="file" accept="application/pdf" style="display:none;" onchange="fakeParse()">
      <div style="font-size:24px;margin-bottom:8px;">📄</div>
      <div style="font-size:13px;color:var(--ink-soft);"><b style="color:var(--ink);">Загрузите PDF из лаборатории</b><br>мы распознаем показатели</div>
    </label>`;
}
function fakeParse(){
  const host=document.getElementById('uploadHost');
  host.innerHTML = `<div style="display:flex;align-items:center;gap:12px;padding:20px;border:1px solid var(--line-soft);border-radius:14px;margin-bottom:18px;"><div class="spinner"></div><span style="font-size:13px;color:var(--ink-soft);">Распознаём показатели…</span></div>`;
  setTimeout(()=>{
    host.innerHTML = `
    <div style="border:1px solid var(--gold);border-radius:14px;padding:18px 20px;margin-bottom:18px;background:rgba(201,168,106,.05);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="width:28px;height:28px;border-radius:50%;background:rgba(201,168,106,.18);color:var(--gold);display:flex;align-items:center;justify-content:center;">✓</div><h4 style="font-size:14px;font-weight:500;">Распознано 4 показателя · ИНВИТРО</h4></div>
      <div style="font-size:13.5px;color:var(--ink-soft);padding:6px 0;">Витамин D — <b style="color:var(--gold-bright);font-family:Fraunces;">52</b></div>
      <div style="font-size:13.5px;color:var(--ink-soft);padding:6px 0;">Ферритин — <b style="color:var(--gold-bright);font-family:Fraunces;">65</b></div>
      <div style="font-size:12px;color:var(--ink-soft);font-style:italic;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft);">Перед добавлением в динамику показатели <b style="color:var(--warn);font-style:normal;">проверит ваш врач</b>.</div>
      <button class="btn-gold" style="width:100%;margin-top:14px;" onclick="sendReview()">Отправить на проверку</button>
    </div>`;
  },1500);
}
function sendReview(){
  const host=document.getElementById('uploadHost');
  host.innerHTML = `<div style="border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;background:var(--bg-2);display:flex;gap:14px;"><div style="width:36px;height:36px;border-radius:50%;background:rgba(217,180,112,.14);color:var(--warn);display:flex;align-items:center;justify-content:center;flex-shrink:0;">🕓</div><div><h4 style="font-size:14px;font-weight:500;margin-bottom:4px;">Анализы на проверке у врача</h4><p style="font-size:12.5px;color:var(--ink-soft);font-weight:300;">Врач сверит показатели и добавит в динамику. Обычно несколько часов.</p><div style="margin-top:8px;"><span class="badge-s b-review">на проверке врачом</span></div></div></div>`;
  toast('Отправлено врачу на проверку');
}

// ---------- navigation + state ----------
function render(){
  document.getElementById('screens').innerHTML = `<div class="screen active" id="scr">${(S[CURRENT]||S.home)()}</div>`;
  if(CURRENT==='booking') wireBooking();
  if(CURRENT==='auth' && AUTH_MODE==='register') toggleAuth();
}
function go(screen){
  CURRENT=screen;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active', i.dataset.screen===screen));
  document.getElementById('nav').classList.remove('open');
  render();
  window.scrollTo(0,0);
}
function setState(s){
  STATE=s;
  document.getElementById('st-filled').classList.toggle('on', s==='filled');
  document.getElementById('st-new').classList.toggle('on', s==='new');
  render();
}
document.querySelectorAll('.nav-item').forEach(i=> i.addEventListener('click',()=>go(i.dataset.screen)));

let toastTimer;
function toast(msg){
  document.getElementById('toastT').textContent=msg;
  const t=document.getElementById('toast'); t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

render();

</script>
</body>
</html>
